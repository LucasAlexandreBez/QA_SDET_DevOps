services:
  mysql:
    image: mysql:8.0.45-debian
    container_name: mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: QAAutomation@2026
    ports:
      - "10000:3306"
    networks:
      - qa-network
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
networks:
  qa-network:
    name: qa-network
